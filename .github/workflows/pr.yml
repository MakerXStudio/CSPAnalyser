name: Pull Request

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"

permissions:
  contents: read

jobs:
  pull_request:
    uses: makerxstudio/shared-config/.github/workflows/node-ci.yml@main
    with:
      compile-script: npm run typecheck
      pre-test-script: npx playwright install --with-deps chromium
      test-script: npm run test:coverage
      audit-script: npm run audit
